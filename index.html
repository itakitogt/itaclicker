<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItakitoClicker</title>
    <style>
        /* Fondo principal de la página */
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: url('fondo.png') no-repeat center center fixed;
            background-size: cover; overflow: hidden; font-family: sans-serif;
        }

        /* Fondo negro opaco para la fase del dansi2 */
        #overlay-negro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; z-index: 99;
        }

        /* Botones en la esquina superior derecha */
        .botones-derecha {
            position: absolute; top: 20px; right: 20px; 
            display: flex; flex-direction: column; align-items: flex-end; 
            gap: 12px; z-index: 100;
        }
        #btn-google-play { cursor: pointer; }
        #btn-x-post { background: #000; color: white; padding: 10px 20px; border-radius: 50% 10% 50% 10%; text-decoration: none; font-weight: bold; }

        /* Animación del cartel colgado para las caritas */
        @keyframes colgado { 
            0% { transform: rotate(3deg); } 
            50% { transform: rotate(-3deg); } 
            100% { transform: rotate(3deg); } 
        }
        
        /* Imagen de las caritas en el centro con su animación de colgado */
        #troll-img { 
            width: 250px; cursor: pointer; 
            animation: colgado 3s infinite ease-in-out; 
            transition: transform 0.1s ease; z-index: 100; 
        }
        /* ¡EFECTO CLAVE! Se hunde al dar click (aplica a cualquier carita que esté puesta) */
        #troll-img:active { transform: scale(0.85) !important; }

        /* Gatito Dansi2 Gigante (300x300) arriba a la izquierda */
        #dansi2-esquina { 
            position: absolute; top: 10px; left: 10px; width: 300px; height: 300px;
            display: none; cursor: pointer; z-index: 101; mix-blend-mode: multiply; 
            transition: transform 0.1s ease;
        }
        /* Efecto de hundirse al clickear el gatito */
        #dansi2-esquina:active { transform: scale(0.85) !important; }

        /* Gatito Dansi (normal) para la fase final de 50 clics */
        #dansi-hacker {
            position: absolute; bottom: 20px; right: 20px; width: 180px;
            display: none; z-index: 100;
        }

        /* Contador abajo de los objetivos */
        #contador { font-size: 50px; color: white; text-shadow: 2px 2px 4px #000; margin-top: 20px; z-index: 100; }

        /* Consola de Logs Hackers */
        #log-container { 
            position: absolute; top: 150px; left: 20px; color: #00ff00; 
            font-family: monospace; font-size: 22px; font-weight: bold; 
            max-height: 300px; overflow: hidden; display: none; z-index: 100; 
            text-shadow: 1px 1px 2px #000;
        }

        /* Responsivo para celulares y tablets */
        @media screen and (max-width: 768px) {
            .botones-derecha { position: relative; top: auto; right: auto; margin-bottom: 20px; align-items: center; }
            #troll-img { width: 180px; }
            #dansi2-esquina { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>

    <!-- Capa oscura -->
    <div id="overlay-negro"></div>

    <!-- El gatito dansi2 (Fase 20 clics) -->
    <img id="dansi2-esquina" src="dansi2.gif" alt="Gatito Caos">

    <!-- El gatito final (Fase 50 clics) -->
    <img id="dansi-hacker" src="dansi.gif" alt="Gatito Hacker">

    <!-- Botones arriba a la derecha -->
    <div class="botones-derecha" id="menu-botones">
        <div id="btn-google-play"><img src="getin.png" alt="Google Play" width="250"></div>
        <a href="https://twitter.com/intent/tweet?text=Itaclicker%20Itaclicker.wtf" target="_blank" id="btn-x-post">X Post</a>
    </div>

    <!-- Imagen de la Carita Principal (Va cambiando de src) -->
    <img id="troll-img" src="troll-face-logo-vecto.png" alt="Troll Face">
    
    <!-- Contador -->
    <div id="contador">0</div>

    <!-- Pantalla de logs de hackeo -->
    <div id="log-container"></div>

    <script>
        let clicks = 0;
        
        const imagen = document.getElementById('troll-img');
        const displayContador = document.getElementById('contador');
        const overlay = document.getElementById('overlay-negro');
        const gatitoDansi2 = document.getElementById('dansi2-esquina');
        const gatitoDansi = document.getElementById('dansi-hacker');
        const botones = document.getElementById('menu-botones');
        const log = document.getElementById('log-container');
        
        const audioHacked = new Audio('Hacked.mp3');
        audioHacked.loop = true;

        // Función de popups
        const explotarPopup = () => {
            window.open('popup.html', '_blank', 'width=300,height=300');
        };

        // Si tocan Google Play tira popups manualmente
        document.getElementById('btn-google-play').addEventListener('click', explotarPopup);

        // --- FUNCIÓN CENTRAL DE CONTEO ---
        const registrarClick = () => {
            clicks++;
            displayContador.innerText = clicks;
            document.title = "ItakitoClicker - " + clicks;

            // Cambios de imagen en el camino (Fase inicial de clics normales)
            if (clicks === 10) {
                imagen.src = 'hewillnever.png';
            }
            if (clicks === 15) {
                imagen.src = 'hewillnever.png'; // Por si quieres meter la que escupe antes del susto
            }

            // FASE 20 CLICS: Todo en la misma pestaña
            if (clicks === 20) {
                audioHacked.play();
                
                // Ocultamos la carita troll y el menú de la derecha
                imagen.style.display = 'none';
                botones.style.display = 'none';
                
                // Activamos el fondo negro opaco y el gatito dansi2.gif (300x300) arriba a la izquierda
                overlay.style.display = 'block';
                gatitoDansi2.style.display = 'block';
            }

            // FASE 50 CLICS: El colapso total del sistema
            if (clicks >= 50) {
                // Quitamos el gatito dansi2 y el overlay oscuro para pasar a la fase final
                gatitoDansi2.style.display = 'none';
                overlay.style.display = 'none';
                
                // Hacemos que regresen los botones de Google Play y aparezca el log con el dansi.gif
                botones.style.display = 'flex';
                log.style.display = 'block';
                gatitoDansi.style.display = 'block';

                const sitios = ["TikTok", "Amazon", "YouTube", "GitHub", "Discord", "Steam", "Roblox", "Netflix"];
                
                // Bucle repetitivo para crashear el navegador
                setInterval(() => {
                    const sitioRandom = sitios[Math.floor(Math.random() * sitios.length)];
                    log.innerHTML += "Logeandome en " + sitioRandom + "...<br>";
                    explotarPopup();
                }, 400);
            }
        };

        // Ambos elementos suman clics y ahora ambos se hunden de forma responsiva al tocarlos
        imagen.addEventListener('click', registrarClick);
        gatitoDansi2.addEventListener('click', registrarClick);
    </script>
</body>
</html>
