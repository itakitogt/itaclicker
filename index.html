<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ItakitoClicker</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: url('fondo.png') no-repeat center center fixed; background-size: cover;
            overflow: hidden;
        }
        #overlay-gris {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(128, 128, 128, 0.6); display: none; z-index: 99;
        }
        #dansi-grande {
            position: absolute; top: 10px; left: 10px; 
            width: 450px; /* Tamaño x3 original (150px * 3) */
            display: none; z-index: 101;
            mix-blend-mode: multiply; /* Intenta quitar fondo blanco */
        }
        #troll-img { width: 250px; cursor: pointer; z-index: 100; }
        #contador { font-size: 50px; color: white; position: absolute; bottom: 20px; }
    </style>
</head>
<body>

    <div id="overlay-gris"></div>
    <img id="dansi-grande" src="dansi2.gif" alt="Gatito Gigante">
    <img id="troll-img" src="troll-face-logo-vector.png" alt="Troll">
    <div id="contador">0</div>

    <script>
        let clicks = 0;
        const imagen = document.getElementById('troll-img');
        const overlay = document.getElementById('overlay-gris');
        const gatitoGrande = document.getElementById('dansi-grande');
        
        imagen.addEventListener('click', () => {
            clicks++;
            document.getElementById('contador').innerText = clicks;

            if (clicks === 20) {
                // 1. Abrir nueva pestaña
                window.open('https://itakitogt.github.io/itaclicker/#/', '_blank');
                
                // 2. Aplicar el overlay y mostrar el gatito x3
                overlay.style.display = 'block';
                gatitoGrande.style.display = 'block';
                
                // 3. Eliminar la carita troll
                imagen.style.display = 'none';
            }
        });
    </script>
</body>
</html>
