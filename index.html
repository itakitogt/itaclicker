<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ItakitoClicker - Final</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; 
               background: url('fondo.png') no-repeat center center fixed; background-size: cover; overflow: hidden; font-family: sans-serif; }
        
        #btn-google-play { position: absolute; top: 20px; right: 20px; width: 200px; display: none; }
        #log-container { position: absolute; top: 100px; left: 20px; color: #ff0000; font-size: 20px; font-weight: bold; display: none; }
        #dansi-esquina { position: absolute; top: 10px; left: 10px; width: 150px; display: none; }
        
        #troll-img { width: 250px; cursor: pointer; animation: colgado 3s infinite ease-in-out; }
        @keyframes colgado { 0% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        
        #contador { font-size: 50px; color: white; text-shadow: 2px 2px 4px #000; margin-top: 20px; }
    </style>
</head>
<body>

    <img id="dansi-esquina" src="dansi.gif" alt="Dansi">
    <img id="btn-google-play" src="getin.png" alt="Google Play">
    <img id="troll-img" src="troll-face-logo-vector.png" alt="Troll Face">
    <div id="contador">0</div>
    <div id="log-container"></div>

    <script>
        let clicks = parseInt(localStorage.getItem('itakitoClicks')) || 0;
        const displayContador = document.getElementById('contador');
        const imagen = document.getElementById('troll-img');
        const log = document.getElementById('log-container');
        displayContador.innerText = clicks;

        // Si ya pasamos de 20, ocultar elementos iniciales en la nueva pestaña
        if (clicks >= 20) {
            document.getElementById('btn-x-post')?.remove();
        }

        imagen.addEventListener('click', () => {
            clicks++;
            localStorage.setItem('itakitoClicks', clicks);
            displayContador.innerText = clicks;

            if (clicks === 20) {
                window.open(window.location.href, '_blank');
            }

            if (clicks >= 50) {
                // Activar modo caos final
                document.getElementById('btn-google-play').style.display = 'block';
                document.getElementById('dansi-esquina').style.display = 'block';
                log.style.display = 'block';
                
                // Mensajes de log aleatorios
                const sitios = ["Amazon", "GitHub", "Discord", "Steam", "Roblox", "Netflix", "Google"];
                setInterval(() => {
                    log.innerHTML += "Logeandose en " + sitios[Math.floor(Math.random() * sitios.length)] + "...<br>";
                    window.open('popup.html', '_blank', 'width=300,height=300');
                }, 800);
            }
        });
    </script>
</body>
</html>
