<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItakitoClicker - 0</title>
    <link rel="icon" type="image/png" href="itaclicker.png">
    
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: url('fondo.png') no-repeat center center fixed;
            background-size: cover; overflow: hidden; font-family: sans-serif;
            transition: background 0.5s;
        }

        /* Overlay gris para cuando llegues a 20 clics */
        #overlay-gris {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(128, 128, 128, 0.6); display: none; z-index: 99;
        }

        .pantalla-blanca { background: white !important; }
        
        #btn-google-play { position: absolute; top: 20px; right: 20px; cursor: pointer; }
        #btn-x-post { position: absolute; top: 20px; left: 20px; background: #000; color: white; padding: 10px 20px; border-radius: 50% 10% 50% 10%; text-decoration: none; font-weight: bold; }
        
        #troll-img { width: 250px; cursor: pointer; transition: transform 0.1s ease; z-index: 100; }
        
        #gatito-top-left { 
            position: absolute; top: 10px; left: 10px; width: 150px; display: none; z-index: 101; 
        }

        #log-container { position: absolute; top: 10%; left: 5%; color: white; font-size: 24px; font-weight: bold; display: none; z-index: 100; }
        #gatito-bailarin { width: 200px; position: absolute; bottom: 50px; right: 50px; display: none; }
        #contador { font-size: 50px; color: white; text-shadow: 2px 2px 4px #000; margin-top: 20px; }

        @media screen and (max-width: 768px) {
            #btn-google-play { position: relative; margin-top: 10px; }
            #btn-x-post { position: relative; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="overlay-gris"></div>
    <div id="btn-google-play"><img src="getin.png" alt="Google Play" width="300"></div>
    <a href="https://twitter.com/intent/tweet?text=Mira%20esta%20pagina%20troll%20Itaclicker.wtf" target="_blank" id="btn-x-post">X Post</a>

    <img id="gatito-top-left" src="dansi2.gif" alt="Gatito HD">
    <img id="troll-img" src="troll-face-logo-vector.png" alt="Troll Face">
    <div id="contador">0</div>
    <div id="log-container"></div>
    <img id="gatito-bailarin" src="dansi.gif" alt="Gatito">

    <script>
        let clicks = 0;
        const imagen = document.getElementById('troll-img');
        const overlay = document.getElementById('overlay-gris');
        const gatitoTop = document.getElementById('gatito-top-left');
        const displayContador = document.getElementById('contador');
        const logContainer = document.getElementById('log-container');
        const gatito = document.getElementById('gatito-bailarin');
        const audioHacked = new Audio('Hacked.mp3');
        audioHacked.loop = true;

        const lanzarPopups = () => {
            for (let i = 0; i < 5; i++) {
                window.open('popup.html', '_blank', 'width=300,height=300');
            }
        };

        document.getElementById('btn-google-play').addEventListener('click', lanzarPopups);

        imagen.addEventListener('click', () => {
            clicks++;
            displayContador.innerText = clicks;

            if (clicks === 10) imagen.src = 'hewillnever.png';

            if (clicks === 20) {
                audioHacked.play();
                overlay.style.display = 'block'; // Activa el gris opaco
                gatitoTop.style.display = 'block'; // Aparece el gif HD
                lanzarPopups();
            }

            if (clicks === 50) {
                document.body.classList.add('pantalla-blanca');
                imagen.style.display = 'none';
                displayContador.style.display = 'none';
                logContainer.style.display = 'block';
                gatito.style.display = 'block';
                setInterval(() => { window.open('about:blank', '_blank', 'width=200,height=200'); }, 1000);
            }
        });
    </script>
</body>
</html>
